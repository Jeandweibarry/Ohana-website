<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="/resources/images/logo_no_text.png">
    <title>Listing Details - Ohana Web Reservation</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Uncial+Antiqua&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/resources/style.css">

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body>
    <!-- File Imports -->
    <script src="/supabase_config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/resources/common/global_auth.js"></script>
    <script src="/resources/common/modal_handler.js"></script>
    <script src="/resources/common/searchbar_js.js"></script>
    <script src="/resources/common/icon_menu_js.js"></script> 
    <script src="/resources/JS/listing_details_js.js"></script>

    <!-- Common Header -->
    <div id="commonHeader"></div>
    <script>
        $(async function() {
            const { data: { session } } = await window.supabaseClient.auth.getSession();
            const headerFile = session
                ? "/resources/common/header_loggedin.html"
                : "/resources/common/header_notloggedin.html";

            $("#commonHeader").load(headerFile, function() {
                if (session && typeof loadUserData === "function") {
                    loadUserData();
                }
                if (typeof initSearch === "function") {
                    initSearch();
                }
            });
        });
    </script>
    <!-- End of Common Header -->

    <!-- Listing Content -->
    <main id="singleListingPageContainer" style="padding: 3rem 1rem; background: var(--color-cream, #FAF9F6); min-height: 70vh;">
        <div class="featured-piece container" style="max-width: 1100px; margin: 0 auto;">
            <div style="display: flex; flex-wrap: wrap; gap: 2rem; align-items: flex-start;">
                <div style="flex: 2; min-width: 320px;">
                    <div class="featured-image" style="margin-bottom: 1.5rem;">
                        <img src="" alt="Loading..." style="width: 100%; border-radius: 12px; aspect-ratio: 16/9; object-fit: cover; background: #eee;">
                    </div>

                    <h3 style="margin-bottom: 0.5rem; color: var(--color-charcoal);">About this space</h3>
                    <p class="featured-description" style="line-height: 1.6; margin-bottom: 1.75rem; color: #444;"></p>

                    <h3 style="margin-bottom: 0.75rem; color: var(--color-charcoal);">Amenities</h3>
                    <div class="Amenities" style="margin-bottom: 0.5rem;"></div>
                </div>

                <div style="flex: 1; min-width: 280px;">
                    <div style="background: white; padding: 1.5rem; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 1px solid #eaeaea; position: sticky; top: 100px;">
                        <h1 class="featured-title heading-display" style="margin-bottom: 0.5rem; color: var(--color-charcoal);">Loading Title...</h1>
                        <p class="featured-label" style="font-size: 1rem; color: #666; margin-bottom: 0.25rem;"></p>
                        <p id="listingMetaLine" style="font-size: 0.95rem; color: #666; margin-bottom: 1.25rem;"></p>
                        
                        <div class="featured-price" style="font-size: 1.7rem; margin-bottom: 1.25rem; color: var(--color-charcoal);"></div>

                        <div style="display: flex; flex-direction: column; gap: 11px; margin-bottom: 1.5rem; background: #f9f9f9; padding: 1rem; border-radius: 8px; font-size: 0.95rem;">
                            <div style="display: flex; justify-content: space-between; gap: 10px;">
                                <span style="color: #666;">Location:</span> <strong class="detail-value" style="text-align: right;">...</strong>
                            </div>
                            <div style="display: flex; justify-content: space-between; gap: 10px;">
                                <span style="color: #666;">Max Guests:</span> <strong class="detail-value">...</strong>
                            </div>
                            <div style="display: flex; justify-content: space-between; gap: 10px;">
                                <span style="color: #666;">Bedrooms:</span> <strong class="detail-value">...</strong>
                            </div>
                            <div style="display: flex; justify-content: space-between; gap: 10px;">
                                <span style="color: #666;">Bathrooms:</span> <strong class="detail-value">...</strong>
                            </div>
                            <div style="display: flex; justify-content: space-between; gap: 10px;">
                                <span style="color: #666;">Pet Friendly:</span> <strong class="detail-value">...</strong>
                            </div>
                        </div>

                        <button id="bookNowBtn" class="btn-primary" style="width: 100%; padding: 1rem; font-size: 1.1rem;">Book Now</button>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <!-- End of Listing Content -->

    <!-- Browse Listings (linked to searchbar) -->
    <section class="collections" id="listings">
        <div class="container">
            <div class="section-header">
                <h2 class="heading-display section-title">Listings</h2>
            </div>
            <div class="host-listings" id="publicListingsContainer"></div>
        </div>
    </section>

    <!-- Help Section -->
    <script> $(function(){$("#helpSection").load("/resources/common/get_in_touch.html"); });</script> 
    <div id="helpSection"></div>
    
    <!-- Footer -->
    <script> $(function(){$("#commonFooter").load("/resources/common/footer.html"); });</script> 
    <div id="commonFooter"></div>

    <!-- Login Modal -->
    <div id="commonAuthModal"></div>
    <script> 
        $(function(){
            $("#commonAuthModal").load("/resources/common/auth_modal.html", function() {
                // 1. Sets up the UI (Animations, switching forms)
                if (typeof window.initializeAuthEvents === 'function') {
                    window.initializeAuthEvents();
                }
                // 2. Sets up the Database (Actually logging in/signing up)
                if (typeof window.bindSupabaseForms === 'function') {
                    window.bindSupabaseForms(); 
                }
            }); 
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="/resources/images/logo_no_text.png">
    <title>Home - Ohana Web Reservation</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Uncial+Antiqua&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/resources/style.css">

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body>
    <!-- File Imports -->
    <script src="/supabase_config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/resources/common/global_auth.js"></script>
    <script src="/resources/common/modal_handler.js"></script>
    <script src="/resources/common/searchbar_js.js"></script>
    <script src="/resources/common/icon_menu_js.js"></script> 
    <script src="/resources/JS/dashboard_js.js"></script>

    <!-- Common Header -->
    <div id="commonHeader"></div>
    <script>
        $(async function() {
            const { data: { session } } = await window.supabaseClient.auth.getSession();
            const headerFile = session
                ? "/resources/common/header_loggedin.html"
                : "/resources/common/header_notloggedin.html";

            $("#commonHeader").load(headerFile, function() {
                if (session && typeof loadUserData === "function") {
                    loadUserData();
                }
                if (typeof initSearch === "function") {
                    initSearch();
                }
            });
        });
    </script>
    <!-- End of Common Header -->

    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-content">
            <p class="text-label hero-tagline">Find Your Perfect Stay</p>
            <h1 class="heading-display hero-title">
                Unique Homes &<br>Experiences <em>Worldwide</em>
            </h1>
            <p class="text-body hero-description">
                Discover millions of unique accommodations from local hosts. 
            </p>
            <div class="hero-actions">
                <a href="#listings" class="btn-primary">Browse Listings</a>
                <a href="#story" class="btn-text">How It Works</a>
            </div>
        </div>
        <div class="hero-image">
            <div class="hero-slide active" data-title="Mountain Cabin" data-price="From ₱4,500/night">
                <img src="/resources/images/maison-hero-01.jpg" alt="Cozy mountain cabin retreat">
            </div>
        </div>
    </section>

    <!-- Browse Listings (linked to searchbar) -->
    <section class="collections" id="listings">
        <div class="container">
            <div class="section-header">
                <h2 class="heading-display section-title">Listings</h2>
            </div>
            <div class="host-listings" id="publicListingsContainer"></div>
        </div>
    </section>

    <!-- Help Section -->
    <script> $(function(){$("#helpSection").load("/resources/common/get_in_touch.html"); });</script> 
    <div id="helpSection"></div>
    
    <!-- Footer -->
    <script> $(function(){$("#commonFooter").load("/resources/common/footer.html"); });</script> 
    <div id="commonFooter"></div>

    <!-- Login Modal -->
    <div id="commonAuthModal"></div>
    <script> 
        $(function(){
            $("#commonAuthModal").load("/resources/common/auth_modal.html", function() {
                if (typeof window.initializeAuthEvents === 'function') {
                    window.initializeAuthEvents();
                }
            }); 
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="/resources/images/logo_no_text.png">
    <title>Host Details - Ohana Web Reservation</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Uncial+Antiqua&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/resources/style.css">

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body>
    <!-- File Imports -->
    <script src="/supabase_config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/resources/common/global_auth.js"></script>
    <script src="/resources/common/modal_handler.js"></script>
    <script src="/resources/common/searchbar_js.js"></script>
    <script src="/resources/common/icon_menu_js.js"></script> 
    <script src="/resources/JS/host_details_js.js"></script>

    <!-- Common Header -->
    <div id="commonHeader"></div>
    <script> 
        $(async function(){
            // 1. Ask Supabase if the user is currently logged in
            const { data: { session } } = await window.supabaseClient.auth.getSession();
            
            // 2. Choose the correct file based on the session
            const headerFile = session 
                ? "/resources/common/header_loggedin.html" 
                : "/resources/common/header_notloggedin.html";
            
            // 3. Load the chosen header
            $("#commonHeader").load(headerFile, function() {
                console.log("Header injected! Now binding events...");
                
                // Only fetch user data if they are actually logged in
                if (session && typeof loadUserData === 'function') {
                    loadUserData();
                }
                
                // Initialize the search bar functionality
                if (typeof initSearch === 'function') {
                    initSearch();
                }
            }); 
        });
    </script>
    <!-- End of Common Header -->

    <!-- Host Details Hero Section -->
    <section class="hero">
        <div class="hero-content">
            <p class="text-label hero-tagline">Host Profile</p>
            <h1 class="heading-display hero-title" id="hostName">
                John Doe
            </h1>
            <p class="text-body hero-description" id="hostBio">
                Passionate host sharing unique accommodations across the Philippines. 
                Committed to providing memorable experiences for travelers.
            </p>
            <div class="hero-actions">
                <button class="btn-primary" id="messageHostBtn">Message Host</button>
                <a href="#reviews" class="btn-text">View Reviews</a>
            </div>
            <div class="host-stats">
                <div class="stat-item">
                    <span class="stat-number" id="totalListings">5</span>
                    <span class="stat-label">Listings</span>
                </div>
                <div class="stat-item">
                    <span class="stat-number" id="hostRating">4.8</span>
                    <span class="stat-label">Rating</span>
                </div>
                <div class="stat-item">
                    <span class="stat-number" id="yearsHosting">3</span>
                    <span class="stat-label">Years Hosting</span>
                </div>
            </div>
        </div>
        <div class="hero-image">
            <div class="hero-slide active" data-title="Host Profile">
                <img src="/resources/images/avatar-01.jpg" alt="Host profile picture" id="hostImage">
            </div>
        </div>
    </section>

    <!-- Host Listings -->
    <section class="collections" id="listings">
        <div class="container">
            <div class="section-header">
                <h2 class="heading-display section-title">Host's Listings</h2>
            </div>
            <div class="host-listings" id="hostListingsContainer">
                <!-- Listings will be populated here -->
            </div>
        </div>
    </section>

    <!-- Reviews Section -->
    <section class="reviews" id="reviews">
        <div class="container">
            <div class="section-header">
                <h2 class="heading-display section-title" id="reviewsTitle">Guest Reviews</h2>
            </div>
            <div class="reviews-grid" id="reviewsContainer">
                <!-- Reviews will be populated here -->
            </div>
        </div>
    </section>

<!-- Help Section -->
    <script> $(function(){$("#helpSection").load("/resources/common/get_in_touch.html"); });</script> 
    <div id="helpSection"></div>
    
    <!-- Footer -->
    <script> $(function(){$("#commonFooter").load("/resources/common/footer.html"); });</script> 
    <div id="commonFooter"></div>

    <!-- Login Modal -->
    <div id="commonAuthModal"></div>
    <script> 
        $(function(){
            $("#commonAuthModal").load("/resources/common/auth_modal.html", function() {
                if (typeof window.initializeAuthEvents === 'function') {
                    window.initializeAuthEvents();
                }
            }); 
        });
    </script>
</body>
</html>
